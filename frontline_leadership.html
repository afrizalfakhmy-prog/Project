<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Frontline Leadership — A-IOS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .fl-page {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .fl-header {
      padding: 14px;
      border: 1px solid rgba(15,23,32,0.08);
      border-radius: 14px;
      background: #fff;
    }

    .fl-header h1 {
      margin: 0;
      font-size: 30px;
      color: #0f172a;
    }

    .fl-header p {
      margin: 6px 0 0 0;
      color: #64748b;
      font-size: 14px;
    }

    .fl-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .fl-card {
      border: 1px solid rgba(15,23,32,0.1);
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 8px 20px rgba(15,23,32,0.05);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .fl-card-image {
      height: 220px;
      background: #f1f5f9;
      border-bottom: 1px solid rgba(15,23,32,0.08);
    }

    .fl-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .fl-card-body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .fl-card-body h3 {
      margin: 0;
      font-size: 24px;
      color: #0f172a;
    }

    .fl-card-body p {
      margin: 0;
      color: #64748b;
      font-size: 13px;
      line-height: 1.35;
    }

    .fl-card-action {
      width: max-content;
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .fl-grid { grid-template-columns: 1fr; }
      .fl-card-image { height: 180px; }
      .fl-header h1 { font-size: 24px; }
      .fl-card-body h3 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="fl-page">
      <header class="fl-header">
        <h1>Frontline Leadership</h1>
        <p>Pilih modul untuk melanjutkan proses pelaporan dan tindak lanjut.</p>
      </header>

      <section class="fl-grid">
        <article class="fl-card">
          <div class="fl-card-image">
            <img src="assets/banner.svg" alt="KTA" />
          </div>
          <div class="fl-card-body">
            <h3>KTA</h3>
            <p>Kondisi Tidak Aman</p>
            <button id="kta-btn" class="fl-card-action">Buka KTA</button>
          </div>
        </article>

        <article class="fl-card">
          <div class="fl-card-image">
            <img src="assets/logo.svg" alt="TTA" />
          </div>
          <div class="fl-card-body">
            <h3>TTA</h3>
            <p>Tindakan Tidak Aman</p>
            <button id="tta-btn" class="fl-card-action">Buka TTA</button>
          </div>
        </article>
      </section>
    </section>
  </main>
  <script src="nav.js"></script>
  <script>
    (function () {
      const ktaBtn = document.getElementById('kta-btn');
      const ttaBtn = document.getElementById('tta-btn');
      if (ktaBtn) {
        ktaBtn.addEventListener('click', function () {
          window.location.href = 'kta.html';
        });
      }
      if (ttaBtn) {
        ttaBtn.addEventListener('click', function () {
          window.location.href = 'tta.html';
        });
      }
    })();
  </script>
</body>
</html>
