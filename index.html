<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Google Search Console verification tag (uncomment and fill token when provided) -->
  <!-- <meta name="google-site-verification" content="YOUR_TOKEN_HERE" /> -->
  <title>A-IOS | All In One OHS Solution</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <main class="app-shell">
    <section id="login-screen" class="card login-card">
      <p class="eyebrow">A-IOS</p>
      <h1>All In One OHS Solution</h1>
      <p class="subtitle">Masuk ke aplikasi untuk mengakses proses kerja OHS yang lebih cepat dan terstruktur.</p>

      <form id="login-form" class="form" novalidate>
        <label for="username">Username / Email</label>
        <input id="username" name="username" type="text" autocomplete="username" placeholder="Masukkan username atau email" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Masukkan password" required />

        <button id="login-btn" type="submit">Login</button>
      </form>
      <p id="login-message" class="message" aria-live="polite"></p>
    </section>

    <section id="dashboard-screen" class="card dashboard hidden">
      <img class="dashboard-brand-logo" src="assets/Logo Alamtri.png" alt="Logo Alam Tri" />
      <header class="dashboard-header">
        <div>
          <p class="eyebrow">A-IOS Dashboard</p>
          <h2>Menu Utama</h2>
          <p class="subtitle small">Role aktif: <strong id="active-role">-</strong></p>
          <p class="subtitle small" id="welcome-user">Selamat datang -</p>
        </div>
        <button id="mobile-sidebar-toggle" class="mobile-menu-toggle" type="button" aria-controls="role-sidebar" aria-expanded="false">Side Menu</button>
      </header>

      <div class="dashboard-layout">
        <button id="mobile-sidebar-backdrop" class="mobile-sidebar-backdrop" type="button" aria-label="Tutup side menu"></button>
        <aside class="sidebar" id="role-sidebar">
          <h3 class="sidebar-title">Sidebar Menu</h3>
          <div id="sidebar-menu" class="sidebar-menu"></div>
        </aside>

        <div class="menu-grid" id="main-menu">
          <button type="button" class="menu-item product-card" data-menu="Frontline Leadership">
            <span class="product-title">Frontline Leadership</span>
            <img class="product-logo" src="assets/talk.gif" alt="Logo Frontline Leadership" />
          </button>
          <button type="button" class="menu-item product-card" data-menu="Inspeksi">
            <span class="product-title">Inspeksi</span>
            <img class="product-logo" src="assets/todolist.gif" alt="Logo Inspeksi" />
          </button>
          <button type="button" class="menu-item product-card" data-menu="Observasi">
            <span class="product-title">Observasi</span>
            <img class="product-logo" src="assets/clipboard.gif" alt="Logo Observasi" />
          </button>
          <button type="button" class="menu-item product-card" data-menu="OHS Talk">
            <span class="product-title">OHS Talk</span>
            <img class="product-logo" src="assets/podcast.gif" alt="Logo OHS Talk" />
          </button>
          <button type="button" class="menu-item product-card" data-menu="JSA">
            <span class="product-title">JSA</span>
            <img class="product-logo" src="assets/content.gif" alt="Logo JSA" />
          </button>
          <button type="button" class="menu-item product-card" data-menu="Work Permit">
            <span class="product-title">Work Permit</span>
            <img class="product-logo" src="assets/approved.gif" alt="Logo Work Permit" />
          </button>
          <button type="button" class="menu-item product-card" data-menu="SPIP">
            <span class="product-title">SPIP</span>
            <img class="product-logo" src="assets/tractor.gif" alt="Logo SPIP" />
          </button>
          <button type="button" class="menu-item product-card" data-menu="OSPEK">
            <span class="product-title">OSPEK</span>
            <img class="product-logo" src="assets/alert.gif" alt="Logo OSPEK" />
          </button>
        </div>
      </div>
    </section>
  </main>

  <script src="scripts/cloud_sync.js"></script>
  <script src="scripts/storage_guard.js"></script>
  <script src="scripts/main.js"></script>
</body>
</html>
