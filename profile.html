<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Profile — A-IOS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>My Profile</h1>

    <section class="profile-card">
      <div class="profile-top">
        <div class="profile-photo-wrap">
          <img id="profile-photo-preview" class="profile-photo" alt="Foto Profil" src="" />
          <div class="profile-photo-overlay">
            <button type="button" id="profile-photo-edit" class="profile-photo-action" title="Ubah foto">✏️</button>
            <button type="button" id="profile-photo-delete" class="profile-photo-action danger" title="Hapus foto">🗑️</button>
          </div>
        </div>
        <input id="profile-photo-input" type="file" accept="image/*" hidden />
      </div>

      <div class="profile-details">
        <h3>Detail User Login</h3>
        <div id="profile-detail-grid" class="profile-grid"></div>
      </div>
    </section>
  </main>
  <script src="app-config.js"></script>
  <script src="api-client.js"></script>
  <script src="nav.js"></script>
  <script src="profile.js"></script>
</body>
</html>
