<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TTA — A-IOS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>TTA</h1>

    <div class="form-actions">
      <button id="show-tta-form-btn" type="button">Tambahkan</button>
    </div>

    <form id="tta-form" class="hidden" novalidate>
      <div class="kta-grid">
        <label>No ID
          <input id="tta-id" type="text" readonly />
        </label>

        <label>Tanggal Laporan
          <input id="tta-tanggal-laporan" type="date" readonly />
        </label>

        <label>Nama Pelapor
          <input id="tta-nama-pelapor" type="text" readonly />
        </label>

        <label>Jabatan
          <input id="tta-jabatan-pelapor" type="text" readonly />
        </label>

        <label>Departemen
          <input id="tta-departemen-pelapor" type="text" readonly />
        </label>

        <label>Perusahaan
          <input id="tta-perusahaan-pelapor" type="text" readonly />
        </label>

        <label>CCOW
          <input id="tta-ccow-pelapor" type="text" readonly />
        </label>

        <label>Tanggal Temuan
          <input id="tta-tanggal-temuan" type="date" />
        </label>

        <label>Jam Temuan
          <input id="tta-jam-temuan" type="time" />
        </label>

        <label>Kategori Temuan
          <input id="tta-kategori-temuan" type="text" placeholder="Masukkan kategori temuan" />
        </label>

        <label>Lokasi Temuan
          <select id="tta-lokasi-temuan">
            <option value="">(Pilih Lokasi)</option>
            <option value="Mining">Mining</option>
            <option value="Hauling">Hauling</option>
            <option value="Port">Port</option>
            <option value="Workshop">Workshop</option>
            <option value="Warehouse">Warehouse</option>
            <option value="CHPP">CHPP</option>
            <option value="Office">Office</option>
            <option value="Camp">Camp</option>
            <option value="Others">Others</option>
          </select>
        </label>

        <label>Detail Lokasi Temuan
          <input id="tta-detail-lokasi-temuan" type="text" placeholder="Masukkan detail lokasi temuan" />
        </label>

        <label>Risk Level
          <select id="tta-risk-level">
            <option value="">(Pilih Risk Level)</option>
            <option value="Critical">Critical</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
        </label>

        <label>Nama PJA
          <select id="tta-nama-pja">
            <option value="">(Pilih Nama PJA)</option>
          </select>
        </label>

        <label>Nama Pelaku TTA
          <select id="tta-nama-pelaku">
            <option value="">(Pilih Nama Pelaku TTA)</option>
          </select>
        </label>

        <label>Jabatan Pelaku TTA
          <input id="tta-jabatan-pelaku" type="text" readonly />
        </label>

        <label>Departemen Pelaku TTA
          <input id="tta-departemen-pelaku" type="text" readonly />
        </label>

        <label>Perusahaan Pelaku TTA
          <input id="tta-perusahaan-pelaku" type="text" readonly />
        </label>

        <label class="kta-full">Detail Temuan
          <textarea id="tta-detail-temuan" rows="4" placeholder="Masukkan detail temuan"></textarea>
        </label>

        <label class="kta-full">Foto Temuan
          <input id="tta-foto-temuan" type="file" accept="image/*" multiple />
        </label>

        <label>Perbaikan Langsung
          <select id="tta-perbaikan-langsung">
            <option value="Tidak">Tidak</option>
            <option value="Ya">Ya</option>
          </select>
        </label>

        <section id="tta-perbaikan-section" class="hidden kta-full">
          <label>Tindakan Perbaikan
            <textarea id="tta-tindakan-perbaikan" rows="4" placeholder="Masukkan tindakan perbaikan"></textarea>
          </label>

          <label>Foto Perbaikan
            <input id="tta-foto-perbaikan" type="file" accept="image/*" multiple />
          </label>

          <label>Tanggal Perbaikan
            <input id="tta-tanggal-perbaikan" type="date" />
          </label>

          <label>Status
            <select id="tta-status-perbaikan">
              <option value="">(Pilih Status)</option>
              <option value="Open">Open</option>
              <option value="Progress">Progress</option>
              <option value="Close">Close</option>
            </select>
          </label>
        </section>

        <div class="form-actions kta-full">
          <button id="save-tta-btn" type="submit">Simpan</button>
          <button id="cancel-tta-form-btn" type="button" class="small">Batal</button>
        </div>
      </div>
    </form>

    <section class="table-section">
      <h3>Data TTA</h3>
      <div class="table-responsive">
        <table id="tta-list">
          <thead>
            <tr>
              <th>No ID</th>
              <th>Tanggal Laporan</th>
              <th>Jam Temuan</th>
              <th>Nama Pelapor</th>
              <th>Foto Temuan</th>
              <th>Nama Pelaku TTA</th>
              <th>Lokasi Temuan</th>
              <th>Risk Level</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app-config.js"></script>
  <script src="api-client.js"></script>
  <script src="nav.js"></script>
  <script src="tta.js"></script>
</body>
</html>
