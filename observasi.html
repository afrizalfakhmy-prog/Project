<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Observasi — A-IOS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Observasi</h1>

    <div class="form-actions">
      <button id="show-observasi-form-btn" type="button">Tambahkan</button>
    </div>

    <form id="observasi-form" class="hidden" novalidate>
      <div class="kta-grid">
        <label>No ID
          <input id="obs-id" type="text" readonly />
        </label>

        <label>Tanggal Laporan
          <input id="obs-tanggal-laporan" type="date" readonly />
        </label>

        <label>Nama Observer
          <input id="obs-nama-observer" type="text" readonly />
        </label>

        <label>Jabatan Observer
          <input id="obs-jabatan-observer" type="text" readonly />
        </label>

        <label>Departemen Observer
          <input id="obs-departemen-observer" type="text" readonly />
        </label>

        <label>Perusahaan Observer
          <input id="obs-perusahaan-observer" type="text" readonly />
        </label>

        <label>CCOW
          <input id="obs-ccow-observer" type="text" readonly />
        </label>

        <label>Tanggal Observasi
          <input id="obs-tanggal-observasi" type="date" />
        </label>

        <label>Waktu Observasi
          <input id="obs-waktu-observasi" type="time" />
        </label>

        <label>Lokasi
          <select id="obs-lokasi">
            <option value="">(Pilih Lokasi)</option>
            <option value="Mining">Mining</option>
            <option value="Hauling">Hauling</option>
            <option value="Port">Port</option>
            <option value="Workshop">Workshop</option>
            <option value="Warehouse">Warehouse</option>
            <option value="CHPP">CHPP</option>
            <option value="Office">Office</option>
            <option value="Camp">Camp</option>
            <option value="Others">Others</option>
          </select>
        </label>

        <label>Detail Lokasi
          <input id="obs-detail-lokasi" type="text" placeholder="Masukkan detail lokasi" />
        </label>

        <label>Nama PJA
          <select id="obs-nama-pja">
            <option value="">(Pilih Nama PJA)</option>
          </select>
        </label>

        <label>Nama Pengawas Pekerjaan
          <select id="obs-nama-pengawas">
            <option value="">(Pilih Nama Pengawas)</option>
          </select>
        </label>

        <section class="kta-full">
          <label>Nama Pekerja</label>
          <div id="obs-nama-pekerja-list" class="user-checkbox-list"></div>
        </section>

        <label>Aktifitas / Pekerjaan
          <input id="obs-aktivitas" type="text" placeholder="Masukkan aktifitas / pekerjaan" />
        </label>

        <label>No SOP / WIN / JSA
          <input id="obs-no-sop" type="text" placeholder="Masukkan nomor SOP / WIN / JSA" />
        </label>

        <section class="kta-full observasi-check" data-check-key="sop">
          <label>Pekerja melakukan aktifitas / pekerjaan sesuai dengan SOP / WIN / JSA
            <select id="obs-check-sop">
              <option value="">(Pilih)</option>
              <option value="Ya">Ya</option>
              <option value="Tidak">Tidak</option>
            </select>
          </label>
          <div id="obs-check-sop-detail" class="hidden observasi-check-detail">
            <label>Alasan / Keterangan
              <textarea id="obs-check-sop-alasan" rows="3" placeholder="Masukkan alasan / keterangan"></textarea>
            </label>
            <label>Status
              <select id="obs-check-sop-status">
                <option value="">(Pilih Status)</option>
                <option value="Open">Open</option>
                <option value="Close">Close</option>
              </select>
            </label>
            <label id="obs-check-sop-tindakan-wrap" class="hidden">Tindakan Perbaikan
              <textarea id="obs-check-sop-tindakan" rows="3" placeholder="Masukkan tindakan perbaikan"></textarea>
            </label>
          </div>
        </section>

        <section class="kta-full observasi-check" data-check-key="apd">
          <label>Pekerja menggunakan APD yang diwajibkan saat melakukan aktifitas / pekerjaan
            <select id="obs-check-apd">
              <option value="">(Pilih)</option>
              <option value="Ya">Ya</option>
              <option value="Tidak">Tidak</option>
            </select>
          </label>
          <div id="obs-check-apd-detail" class="hidden observasi-check-detail">
            <label>Alasan / Keterangan
              <textarea id="obs-check-apd-alasan" rows="3" placeholder="Masukkan alasan / keterangan"></textarea>
            </label>
            <label>Status
              <select id="obs-check-apd-status">
                <option value="">(Pilih Status)</option>
                <option value="Open">Open</option>
                <option value="Close">Close</option>
              </select>
            </label>
            <label id="obs-check-apd-tindakan-wrap" class="hidden">Tindakan Perbaikan
              <textarea id="obs-check-apd-tindakan" rows="3" placeholder="Masukkan tindakan perbaikan"></textarea>
            </label>
          </div>
        </section>

        <section class="kta-full observasi-check" data-check-key="kompetensi">
          <label>Pekerja memiliki kompetensi yang sesuai untuk melaksanakan aktifitas / pekerjaan
            <select id="obs-check-kompetensi">
              <option value="">(Pilih)</option>
              <option value="Ya">Ya</option>
              <option value="Tidak">Tidak</option>
            </select>
          </label>
          <div id="obs-check-kompetensi-detail" class="hidden observasi-check-detail">
            <label>Alasan / Keterangan
              <textarea id="obs-check-kompetensi-alasan" rows="3" placeholder="Masukkan alasan / keterangan"></textarea>
            </label>
            <label>Status
              <select id="obs-check-kompetensi-status">
                <option value="">(Pilih Status)</option>
                <option value="Open">Open</option>
                <option value="Close">Close</option>
              </select>
            </label>
            <label id="obs-check-kompetensi-tindakan-wrap" class="hidden">Tindakan Perbaikan
              <textarea id="obs-check-kompetensi-tindakan" rows="3" placeholder="Masukkan tindakan perbaikan"></textarea>
            </label>
          </div>
        </section>

        <section class="kta-full observasi-check" data-check-key="limaR">
          <label>Tempat kerja memenuhi pelaksanaan program 5R
            <select id="obs-check-limaR">
              <option value="">(Pilih)</option>
              <option value="Ya">Ya</option>
              <option value="Tidak">Tidak</option>
            </select>
          </label>
          <div id="obs-check-limaR-detail" class="hidden observasi-check-detail">
            <label>Alasan / Keterangan
              <textarea id="obs-check-limaR-alasan" rows="3" placeholder="Masukkan alasan / keterangan"></textarea>
            </label>
            <label>Status
              <select id="obs-check-limaR-status">
                <option value="">(Pilih Status)</option>
                <option value="Open">Open</option>
                <option value="Close">Close</option>
              </select>
            </label>
            <label id="obs-check-limaR-tindakan-wrap" class="hidden">Tindakan Perbaikan
              <textarea id="obs-check-limaR-tindakan" rows="3" placeholder="Masukkan tindakan perbaikan"></textarea>
            </label>
          </div>
        </section>

        <section class="kta-full observasi-check" data-check-key="fit">
          <label>Pekerja dalam kondisi fit dan layak kerja
            <select id="obs-check-fit">
              <option value="">(Pilih)</option>
              <option value="Ya">Ya</option>
              <option value="Tidak">Tidak</option>
            </select>
          </label>
          <div id="obs-check-fit-detail" class="hidden observasi-check-detail">
            <label>Alasan / Keterangan
              <textarea id="obs-check-fit-alasan" rows="3" placeholder="Masukkan alasan / keterangan"></textarea>
            </label>
            <label>Status
              <select id="obs-check-fit-status">
                <option value="">(Pilih Status)</option>
                <option value="Open">Open</option>
                <option value="Close">Close</option>
              </select>
            </label>
            <label id="obs-check-fit-tindakan-wrap" class="hidden">Tindakan Perbaikan
              <textarea id="obs-check-fit-tindakan" rows="3" placeholder="Masukkan tindakan perbaikan"></textarea>
            </label>
          </div>
        </section>

        <label class="kta-full">Tindakan apresiasi yang dilakukan untuk tindakan atau kondisi aman
          <textarea id="obs-tindakan-apresiasi" rows="4" placeholder="Masukkan tindakan apresiasi"></textarea>
        </label>

        <label class="kta-full">Tindak lanjut dan komitmen yang dilakukan untuk memperbaiki tindakan atau kondisi tidak aman
          <textarea id="obs-tindak-lanjut" rows="4" placeholder="Masukkan tindak lanjut dan komitmen"></textarea>
        </label>

        <label class="kta-full">Lampiran
          <input id="obs-lampiran" type="file" multiple />
        </label>

        <div class="form-actions kta-full">
          <button id="save-observasi-btn" type="submit">Simpan</button>
          <button id="cancel-observasi-form-btn" type="button" class="small">Batal</button>
        </div>
      </div>
    </form>

    <section class="table-section">
      <h3>Data Observasi</h3>
      <div class="table-responsive">
        <table id="observasi-list">
          <thead>
            <tr>
              <th>No ID</th>
              <th>Tanggal Laporan</th>
              <th>Nama Observer</th>
              <th>Lokasi</th>
              <th>Nama Pengawas</th>
              <th>Jumlah Pekerja</th>
              <th>Status Temuan</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app-config.js"></script>
  <script src="api-client.js"></script>
  <script src="nav.js"></script>
  <script src="observasi.js"></script>
</body>
</html>
