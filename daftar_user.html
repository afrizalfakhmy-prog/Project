<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Daftar User — A-IOS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Daftar User</h1>
    <p>Kelola pengguna sistem. Data tersimpan di localStorage (`aios_users`). Kembali ke <a href="index.html">Dashboard</a>.</p>
    <section id="user-list-page">
      <div id="user-management">
        <div class="user-actions">
          <button id="add-user-btn" class="primary">Tambah User</button>
          <input id="user-search" placeholder="Cari nama, username atau nomor karyawan..." />
        </div>

        <div id="user-list-container">
          <table id="user-list">
            <thead>
              <tr>
                <th>Username</th>
                <th>Nama</th>
                <th>No Karyawan</th>
                <th>Departemen</th>
                <th>Perusahaan</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <form id="user-form" class="hidden">
          <h4 id="user-form-title">Tambah User</h4>
          <input type="hidden" id="user-id" />
          <label>Username <small style="color:#666;font-weight:normal;">(Teks, tidak boleh spasi, unik)</small><input id="field-username" type="text" required placeholder="contoh: jokowi_123" /></label>
          <label>Password <small style="color:#666;font-weight:normal;">(Min 8 karakter, huruf & angka)</small><input id="field-password" type="password" minlength="8" placeholder="contoh: Aman@2024" required /></label>
          <label>Kategori <small style="color:#666;font-weight:normal;">(Admin atau User)</small>
            <select id="field-kategori" required>
              <option value="">-- Pilih Kategori --</option>
              <option value="User">User</option>
              <option value="Admin">Admin</option>
            </select>
          </label>
          <label>Nama Lengkap <small style="color:#666;font-weight:normal;">(Sesuai identitas resmi)</small><input id="field-nama" type="text" required placeholder="contoh: Joko Widodo" /></label>
          <label>Tempat Lahir <small style="color:#666;font-weight:normal;">(Nama kota)</small><input id="field-tempat" type="text" required placeholder="contoh: Jakarta" /></label>
          <label>Tanggal Lahir <small style="color:#666;font-weight:normal;">(Format pilih dari kalender)</small><input id="field-tgl" type="date" required /></label>
          <label>No HP <small style="color:#666;font-weight:normal;">(Angka saja, max 13 digit)</small><input id="field-hp" type="tel" maxlength="13" pattern="[0-9]*" required placeholder="08123456789" /></label>
          <label>Alamat Email <small style="color:#666;font-weight:normal;">(Format valid email)</small><input id="field-email" type="email" required placeholder="user@example.com" /></label>
          <label>Alamat Lengkap <small style="color:#666;font-weight:normal;">(Detail lengkap dengan desa/kota)</small><textarea id="field-alamat" rows="3" required placeholder="Jl. Contoh No. 123, Kota, Prov."></textarea></label>
          <label>No KTP <small style="color:#666;font-weight:normal;">(Angka saja, 15-17 digit)</small><input id="field-ktp" type="tel" maxlength="17" pattern="[0-9]*" required placeholder="3201234567890123" /></label>
          <label>No Karyawan <small style="color:#666;font-weight:normal;">(Sesuai format perusahaan)</small><input id="field-karyawan" type="text" required placeholder="EMP-2024-001" /></label>
          <label>No Mine Permit <small style="color:#666;font-weight:normal;">(Nomor izin pertambangan)</small><input id="field-mine" type="text" required placeholder="MP-2024-12345" /></label>
          <label>Jabatan <small style="color:#666;font-weight:normal;">(Posisi kerja saat ini)</small><input id="field-jabatan" type="text" required placeholder="Kepala Regu" /></label>
          <label>Kelompok Jabatan <small style="color:#666;font-weight:normal;">(Kategori jabatan)</small><input id="field-kelompok" type="text" required placeholder="Teknis" /></label>
          <label>Departemen <small style="color:#666;font-weight:normal;">(Pilih dari daftar)</small>
            <select id="field-departemen" required><option value="">(Pilih Departemen)</option></select>
          </label>
          <label>Perusahaan <small style="color:#666;font-weight:normal;">(Pilih dari daftar)</small>
            <select id="field-perusahaan" required><option value="">(Pilih Perusahaan)</option></select>
          </label>
          <label>CCOW <small style="color:#666;font-weight:normal;">(PT. Maruwai atau PT. Lahai)</small>
            <select id="field-ccow" required><option value="">(Pilih CCOW)</option><option value="PT. Maruwai Coal">PT. Maruwai Coal</option><option value="PT. Lahai Coal">PT. Lahai Coal</option></select>
          </label>

          <div class="form-actions">
            <button type="button" id="save-user-btn" class="primary">Simpan</button>
            <button type="button" id="cancel-user-btn">Batal</button>
          </div>
        </form>
      </div>
    </section>
  </main>
  <script src="nav.js"></script>
  <script src="app-config.js"></script>
  <script src="api-client.js"></script>
  <script src="script.js"></script>
  <script>
    console.log('Initializing daftar_user page...');
      
      // ensure only Admin or Super Admin can view
      const s = localStorage.getItem('aios_session');
      const session = s ? JSON.parse(s) : null;
      
      if (!session) {
        console.error('No session found');
        alert('Silakan login terlebih dahulu.');
        window.location.href = 'index.html';
      } else if (session.role !== 'Super Admin' && session.role !== 'Admin') {
        console.error('Access denied. User role:', session.role);
        alert('Akses ditolak. Hanya Admin atau Super Admin yang dapat mengakses halaman ini.');
        window.location.href = 'index.html';
      } else {
        console.log('Access granted for role:', session.role);
        // populate and render
        try {
          console.log('Populating options...');
          if (typeof populateDeptOptions === 'function') populateDeptOptions();
          if (typeof populateCompanyOptions === 'function') populateCompanyOptions();
          if (typeof populateCcowOptions === 'function') populateCcowOptions();
          console.log('Rendering user list...');
          if (typeof renderUserList === 'function') renderUserList();
          console.log('Page initialization complete');
        } catch (popErr) {
          console.error('Error during population/render:', popErr);
          alert('Terjadi kesalahan memuat data: ' + (popErr.message || String(popErr)));
        }
      }
      
      // if requested to open add form via URL param, do it
      try {
        const params = new URLSearchParams(window.location.search);
        if (params.get('action') === 'add') {
          console.log('Opening add form from URL param');
          if (typeof openUserForm === 'function') openUserForm();
        }
      } catch (e) { 
        console.warn('Error opening form from URL:', e);
      }
  </script>
</body>
</html>
