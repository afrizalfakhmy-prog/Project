<svg width="400" height="180" viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b63ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#6b8cff;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="180" fill="url(#bannerGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="350" cy="30" r="40" fill="#fff" opacity="0.1"/>
  <circle cx="80" cy="150" r="35" fill="#fff" opacity="0.1"/>
  <circle cx="350" cy="160" r="25" fill="#fff" opacity="0.08"/>
  
  <!-- Center shield icon -->
  <g transform="translate(200, 90)">
    <circle cx="0" cy="0" r="45" fill="#fff" opacity="0.15"/>
    
    <!-- Shield -->
    <path d="M 0,-25 L 18,-15 L 18,12 Q 0,28 0,28 Q 0,28 -18,12 L -18,-15 Z" 
          fill="#fff" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- Check mark -->
    <path d="M -8,4 L -2,10 L 8,-2" 
          stroke="#0b63ff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
        text-anchor="middle" fill="#fff" opacity="0.9">
    A-IOS • OHS Management System
  </text>
</svg>
