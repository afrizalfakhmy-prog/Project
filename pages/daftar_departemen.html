<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daftar Departemen | A-IOS</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <main class="app-shell">
    <section class="card module-card">
      <header class="module-header">
        <h1>Daftar Departemen</h1>
        <div class="module-actions">
          <button id="add-dept-btn" type="button">Tambah</button>
          <a class="link-btn" href="../index.html">Kembali ke Dashboard</a>
        </div>
      </header>

      <form id="dept-form" class="inline-form hidden">
        <input id="dept-id" type="hidden" />
        <div class="field-wrap">
          <label for="dept-name">Departemen</label>
          <input id="dept-name" type="text" required placeholder="Masukkan nama departemen" />
        </div>
        <div class="field-wrap full">
          <div class="form-inline-actions">
            <button type="submit">Simpan Departemen</button>
            <button id="cancel-dept-btn" type="button" class="ghost">Batal</button>
          </div>
        </div>
      </form>

      <table class="data-table">
        <thead>
          <tr>
            <th>Departemen</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="dept-tbody"></tbody>
      </table>
    </section>
  </main>

  <script src="../scripts/storage_guard.js"></script>
  <script src="../scripts/pages/daftar_departemen.js"></script>
</body>
</html>
