<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Profile | A-IOS</title>
  <link rel="stylesheet" href="../styles/main.css?v=20260402b" />
</head>
<body>
  <main class="app-shell">
    <section class="card module-card">
      <header class="module-header">
        <h1>My Profile</h1>
        <div class="module-actions">
          <a class="link-btn" href="../index.html">Kembali ke Dashboard</a>
        </div>
      </header>

      <p class="subtitle">Detail profil diambil dari data Daftar User sesuai akun yang sedang login.</p>

      <form id="my-profile-form">
        <section class="profile-grid" aria-label="Detail Profil User">
          <article class="profile-item"><span class="profile-label">Username</span><strong id="profile-username" class="profile-value">-</strong></article>
          <article class="profile-item"><span class="profile-label">Kategori</span><strong id="profile-kategori" class="profile-value">-</strong></article>
          <article class="profile-item"><span class="profile-label">Nama Lengkap</span><strong id="profile-nama" class="profile-value">-</strong></article>

          <article class="profile-item">
            <label class="profile-label" for="profile-password-input">Password</label>
            <input id="profile-password-input" type="password" minlength="8" required />
          </article>
          <article class="profile-item">
            <label class="profile-label" for="profile-tempat-input">Tempat Lahir</label>
            <input id="profile-tempat-input" type="text" required />
          </article>
          <article class="profile-item">
            <label class="profile-label" for="profile-tgl-input">Tanggal Lahir</label>
            <input id="profile-tgl-input" type="date" required />
          </article>
          <article class="profile-item">
            <label class="profile-label" for="profile-hp-input">No HP</label>
            <input id="profile-hp-input" type="text" inputmode="numeric" maxlength="13" required />
          </article>
          <article class="profile-item">
            <label class="profile-label" for="profile-email-input">Email</label>
            <input id="profile-email-input" type="email" required />
          </article>
          <article class="profile-item profile-item-full">
            <label class="profile-label" for="profile-alamat-input">Alamat</label>
            <textarea id="profile-alamat-input" rows="3" required></textarea>
          </article>
          <article class="profile-item">
            <label class="profile-label" for="profile-ktp-input">No KTP</label>
            <input id="profile-ktp-input" type="text" inputmode="numeric" maxlength="17" required />
          </article>
          <article class="profile-item">
            <label class="profile-label" for="profile-karyawan-input">No Karyawan</label>
            <input id="profile-karyawan-input" type="text" required />
          </article>
          <article class="profile-item">
            <label class="profile-label" for="profile-mine-input">No Mine Permit</label>
            <input id="profile-mine-input" type="text" required />
          </article>
          <article class="profile-item">
            <label class="profile-label" for="profile-jabatan-input">Jabatan</label>
            <input id="profile-jabatan-input" type="text" required />
          </article>

          <article class="profile-item"><span class="profile-label">Kelompok Jabatan</span><strong id="profile-kelompok" class="profile-value">-</strong></article>
          <article class="profile-item"><span class="profile-label">Departemen</span><strong id="profile-departemen" class="profile-value">-</strong></article>
          <article class="profile-item"><span class="profile-label">Perusahaan</span><strong id="profile-perusahaan" class="profile-value">-</strong></article>
          <article class="profile-item"><span class="profile-label">CCOW</span><strong id="profile-ccow" class="profile-value">-</strong></article>
        </section>

        <div class="form-inline-actions profile-actions">
          <button type="submit">Simpan Perubahan</button>
        </div>
        <p id="profile-message" class="message" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="../scripts/cloud_sync.js"></script>
  <script src="../scripts/storage_guard.js"></script>
  <script src="../scripts/pages/my_profile.js"></script>
</body>
</html>
